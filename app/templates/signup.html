<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sign up — {{ app_name }}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <h1>&#9728; {{ app_name }}</h1>
    <div class="sub">Create an account to set up your dashboard</div>

    <div class="form-error" id="error"></div>

    <form id="signupForm">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" minlength="3" maxlength="50" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" minlength="6" autocomplete="new-password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Sign up</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="/login">Log in</a>
    </div>
  </div>
</div>

<script>
const form = document.getElementById("signupForm");
const errorBox = document.getElementById("error");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  errorBox.classList.remove("show");

  const payload = {
    username: document.getElementById("username").value,
    password: document.getElementById("password").value,
  };

  try {
    const res = await fetch("/api/auth/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || "Registration failed");
    }
    window.location.href = "/login";
  } catch (err) {
    errorBox.textContent = err.message;
    errorBox.classList.add("show");
  }
});
</script>
</body>
</html>
